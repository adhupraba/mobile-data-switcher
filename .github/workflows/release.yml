name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
        
      - name: Execute Unit Tests
        run: ./gradlew testDebugUnitTest

  build:
    name: Build & Release APK
    needs: test
    runs-on: ubuntu-latest
    
    environment: 
      name: release
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Unsigned Release APK
        run: ./gradlew assembleRelease

      - name: Visually Sign APK with GitHub Secrets
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 34.0.0

      - name: Rename Signed Artifact
        run: |
          mv "${{steps.sign_app.outputs.signedReleaseFile}}" mobile-data-switcher-release.apk

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: mobile-data-switcher-release.apk
          tag_name: release-build-${{ github.run_number }}
          generate_release_notes: true
