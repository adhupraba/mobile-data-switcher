name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
        
      - name: Execute Unit Tests
        run: ./gradlew testDebugUnitTest

  build:
    name: Build & Release APK
    needs: test
    runs-on: ubuntu-latest
    
    environment: 
      name: release
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Unsigned Release APK
        run: ./gradlew assembleRelease

      - name: Setup Keystore & Sign APK Natively
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          # Dynamically locate the latest Android Build Tools installed on the Github Runner
          BUILD_TOOLS_VERSION=$(ls /usr/local/lib/android/sdk/build-tools/ | sort -V | tail -n 1)
          APKSIGNER="/usr/local/lib/android/sdk/build-tools/${BUILD_TOOLS_VERSION}/apksigner"
          ZIPALIGN="/usr/local/lib/android/sdk/build-tools/${BUILD_TOOLS_VERSION}/zipalign"
          
          echo "Using Android Build Tools $BUILD_TOOLS_VERSION"

          # 1. Safely decode the base64 Secret into a temporary physical .jks file format
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks

          # 2. Re-align the bytecode to meet Android OS compliance rules
          $ZIPALIGN -p -f -v 4 app/build/outputs/apk/release/app-release-unsigned.apk aligned.apk

          # 3. Cryptographically seal the APK using your dynamically loaded keystore
          $APKSIGNER sign --ks keystore.jks \
            --ks-pass "env:STORE_PASSWORD" \
            --key-pass "env:KEY_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --out mobile-data-switcher-release.apk aligned.apk
          
          # Clean up the raw keystore from memory just to be safe
          rm keystore.jks

      - name: Extract App Version
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName =' app/build.gradle.kts | awk -F'"' '{print $2}')
          echo "APP_VERSION=$VERSION_NAME" >> $GITHUB_ENV

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: mobile-data-switcher-release.apk
          tag_name: "v${{ env.APP_VERSION }}"
          name: "Mobile Data Switcher v${{ env.APP_VERSION }}"
          generate_release_notes: true
